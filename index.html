<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Banana</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
      font-family: Georgia, serif;
    }

    /* ── NASA APOD Background ── */
    #apod-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #apod-bg.loaded { opacity: 1; }

    /* ── Banana wrapper ── */
    .banana-wrap {
      position: relative;
      z-index: 1;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      /* smooth spin start */
      animation-play-state: paused;
    }

    .banana-wrap.spinning {
      animation: clockwise 4s linear infinite;
      animation-play-state: running;
    }

    @keyframes clockwise {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .banana-img {
      display: block;
      width: 260px;
      filter: drop-shadow(0 0 24px rgba(255, 230, 80, 0.55));
      pointer-events: none;
    }

    /* ── Blue sash ribbon ── */
    .ribbon {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-32deg);
      background: #1554b8;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 9px 0;
      width: 340px;
      text-align: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.55);
      border-top:    2px solid rgba(255,255,255,0.35);
      border-bottom: 2px solid rgba(255,255,255,0.35);
      pointer-events: none;
      /* notched ends via clip-path */
      clip-path: polygon(
        0% 0%,
        calc(100% - 0px) 0%,
        100% 50%,
        calc(100% - 0px) 100%,
        0% 100%,
        0px 50%
      );
    }

    /* pointed ribbon ends */
    .ribbon::before,
    .ribbon::after {
      content: '';
      position: absolute;
      top: 0;
      border-style: solid;
      border-color: transparent;
      border-width: 19px 13px;
    }
    .ribbon::before {
      left: -26px;
      border-right-color: #1554b8;
    }
    .ribbon::after {
      right: -26px;
      border-left-color: #1554b8;
    }

    /* ── APOD credit ── */
    #apod-credit {
      position: fixed;
      bottom: 12px;
      right: 14px;
      z-index: 2;
      color: rgba(255,255,255,0.75);
      font-family: sans-serif;
      font-size: 0.72rem;
      text-align: right;
      max-width: 320px;
      text-shadow: 0 1px 4px #000;
    }
    #apod-credit a {
      color: rgba(180,210,255,0.95);
      text-decoration: none;
    }
    #apod-credit a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <img id="apod-bg" alt="NASA Astronomy Picture of the Day" />

  <div class="banana-wrap" id="banana" onclick="toggleSpin(this)">
    <img class="banana-img" src="banana.png" alt="Banana" />
    <div class="ribbon">Push&nbsp;me</div>
  </div>

  <div id="apod-credit"></div>

  <script>
    /* ── Load NASA APOD background ── */
    async function loadAPOD() {
      const bg     = document.getElementById('apod-bg');
      const credit = document.getElementById('apod-credit');

      try {
        const res  = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
        const data = await res.json();

        if (data.media_type === 'image') {
          bg.onload = () => bg.classList.add('loaded');
          bg.src = data.hdurl || data.url;
          credit.innerHTML =
            `<a href="https://apod.nasa.gov/apod/astropix.html" target="_blank" rel="noopener">
               NASA APOD
             </a>: ${data.title}`;
        } else {
          /* APOD is a video today — use thumbnail if available */
          if (data.thumbnail_url) {
            bg.onload = () => bg.classList.add('loaded');
            bg.src = data.thumbnail_url;
          } else {
            fallbackBg();
          }
          credit.innerHTML =
            `<a href="https://apod.nasa.gov/apod/astropix.html" target="_blank" rel="noopener">
               NASA APOD
             </a>: ${data.title}`;
        }
      } catch (err) {
        console.warn('Could not load APOD:', err);
        fallbackBg();
      }
    }

    function fallbackBg() {
      document.body.style.background =
        'radial-gradient(ellipse at center, #0d1b3e 0%, #000005 100%)';
    }

    /* ── Banana click: toggle spin ── */
    function toggleSpin(el) {
      el.classList.toggle('spinning');
    }

    loadAPOD();
  </script>
</body>
</html>
