<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Banana</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    /* ── NASA APOD Background ── */
    #apod-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #apod-bg.loaded { opacity: 1; }

    /* ── Top-left APOD title card ── */
    #apod-title-card {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 2;
      font-family: 'Times New Roman', Times, serif;
      color: #fff;
      pointer-events: none;
    }

    #apod-title-card .label {
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      line-height: 1.25;
      text-shadow: 0 2px 16px rgba(0,0,0,0.95), 0 0 40px rgba(0,0,0,0.7);
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    #apod-title-card .date {
      font-size: 0.92rem;
      font-style: italic;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 10px rgba(0,0,0,0.9);
    }

    /* ── Banana wrapper — 260 × 80% = 208px ── */
    .banana-wrap {
      position: relative;
      z-index: 1;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      width: 208px;
    }

    .banana-wrap.spinning {
      animation: clockwise 4s linear infinite;
    }

    @keyframes clockwise {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .banana-img {
      display: block;
      width: 100%;
      filter: drop-shadow(0 0 24px rgba(255, 230, 80, 0.5));
      pointer-events: none;
    }

    /* ── Ribbon — 208 × 90% = 187px ── */
    .ribbon-wrap {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 187px;
      pointer-events: none;
    }

    .ribbon-img {
      display: block;
      width: 100%;
    }

    .ribbon-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Times New Roman', Times, serif;
      font-size: 0.8rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 5px rgba(0,0,0,0.7);
    }

    /* ── Bottom-right APOD credit ── */
    #apod-credit {
      position: fixed;
      bottom: 12px;
      right: 14px;
      z-index: 2;
      color: rgba(255,255,255,0.6);
      font-family: sans-serif;
      font-size: 0.7rem;
      text-align: right;
      max-width: 320px;
      text-shadow: 0 1px 4px #000;
    }
    #apod-credit a {
      color: rgba(180,210,255,0.85);
      text-decoration: none;
    }
    #apod-credit a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <img id="apod-bg" alt="NASA Astronomy Picture of the Day" />

  <!-- Top-left title card -->
  <div id="apod-title-card">
    <div class="label">NASA Astronomy Picture of the Day</div>
    <div class="date" id="today-date"></div>
  </div>

  <!-- Banana + ribbon -->
  <div class="banana-wrap" id="banana" onclick="toggleSpin(this)">
    <img class="banana-img" src="banana.png" alt="Banana" />
    <div class="ribbon-wrap">
      <img class="ribbon-img" src="ribbon_s.png" alt="ribbon" />
      <span class="ribbon-text">Push Me</span>
    </div>
  </div>

  <div id="apod-credit"></div>

  <script>
    /* ── Today's date ── */
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

    /* ── Load NASA APOD by scraping astropix.html via CORS proxy ── */
    async function loadAPOD() {
      const bg     = document.getElementById('apod-bg');
      const credit = document.getElementById('apod-credit');

      try {
        const proxyUrl = 'https://api.allorigins.win/get?url=' +
          encodeURIComponent('https://apod.nasa.gov/apod/astropix.html');

        const res  = await fetch(proxyUrl);
        const data = await res.json();

        const parser = new DOMParser();
        const doc    = parser.parseFromString(data.contents, 'text/html');

        // APOD main image: find first <a href="image/YYMM/file.jpg">
        let imgPath = null;
        for (const a of doc.querySelectorAll('a[href]')) {
          if (/image\/.*\.jpg$/i.test(a.getAttribute('href'))) {
            imgPath = a.getAttribute('href');
            break;
          }
        }
        // Fallback: <img src="image/...jpg">
        if (!imgPath) {
          for (const img of doc.querySelectorAll('img[src]')) {
            if (/image\/.*\.jpg$/i.test(img.getAttribute('src'))) {
              imgPath = img.getAttribute('src');
              break;
            }
          }
        }

        if (imgPath) {
          bg.onload = () => bg.classList.add('loaded');
          bg.src = 'https://apod.nasa.gov/apod/' + imgPath;

          // Picture title for bottom-right credit
          const bold = doc.querySelector('center b');
          const titleText = bold ? bold.textContent.trim() : '';
          if (titleText) {
            credit.innerHTML =
              `<a href="https://apod.nasa.gov/apod/astropix.html" target="_blank" rel="noopener">APOD</a>: ${titleText}`;
          }
        } else {
          fallbackBg();
        }

      } catch (err) {
        console.warn('Could not load APOD:', err);
        fallbackBg();
      }
    }

    function fallbackBg() {
      document.body.style.background =
        'radial-gradient(ellipse at center, #0d1b3e 0%, #000005 100%)';
    }

    /* ── Banana click: toggle spin ── */
    function toggleSpin(el) {
      el.classList.toggle('spinning');
    }

    loadAPOD();
  </script>
</body>
</html>
