<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Banana</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    /* ── NASA APOD Background ── */
    #apod-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #apod-bg.loaded { opacity: 1; }

    /* ── Top-left APOD title card ── */
    #apod-title-card {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 2;
      font-family: 'Times New Roman', Times, serif;
      color: #fff;
      pointer-events: none;
    }

    #apod-title-card .label {
      font-size: 1.4rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      line-height: 1.25;
      text-shadow: 0 2px 16px rgba(0,0,0,0.95), 0 0 40px rgba(0,0,0,0.7);
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    #apod-title-card .date {
      font-size: 0.92rem;
      font-style: italic;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 10px rgba(0,0,0,0.9);
    }

    /* ── Banana wrapper — 208px ── */
    .banana-wrap {
      position: relative;
      z-index: 1;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      width: 208px;
    }

    /* CSS spin used only during initial 2-rotation phase */
    .banana-wrap.spinning {
      animation: clockwise 4s linear infinite;
    }

    @keyframes clockwise {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .banana-img {
      display: block;
      width: 100%;
      filter: drop-shadow(0 0 24px rgba(255, 230, 80, 0.5));
      pointer-events: none;
    }

    /* ── Bottom-right APOD credit ── */
    #apod-credit {
      position: fixed;
      bottom: 12px;
      right: 14px;
      z-index: 2;
      color: rgba(255,255,255,0.6);
      font-family: sans-serif;
      font-size: 0.7rem;
      text-align: right;
      max-width: 320px;
      text-shadow: 0 1px 4px #000;
    }
    #apod-credit a {
      color: rgba(180,210,255,0.85);
      text-decoration: none;
    }
    #apod-credit a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <img id="apod-bg" alt="NASA Astronomy Picture of the Day" />

  <!-- Top-left title card -->
  <div id="apod-title-card">
    <div class="label">NASA Astronomy Picture of the Day</div>
    <div class="date" id="today-date"></div>
  </div>

  <!-- Banana + ribbon -->
  <div class="banana-wrap" id="banana" onclick="handleClick(this)">
    <img class="banana-img" src="banana.png" alt="Banana" />
  </div>

  <div id="apod-credit"></div>

  <script>
    /* ── Today's date ── */
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

    /* ── Load NASA APOD — tries 3 strategies in order ── */
    async function loadAPOD() {
      const strategies = [
        () => fetchViaCorsproxy(),
        () => fetchViaAllorigins(),
        () => fetchViaNasaAPI(),
      ];
      for (const fn of strategies) {
        try { if (await fn()) return; } catch (_) {}
      }
      fallbackBg();
    }

    // Strategy 1: corsproxy.io (returns raw HTML)
    async function fetchViaCorsproxy() {
      const res = await fetch(
        'https://corsproxy.io/?' + encodeURIComponent('https://apod.nasa.gov/apod/astropix.html'),
        { signal: AbortSignal.timeout(6000) }
      );
      if (!res.ok) return false;
      return parseAPODHtml(await res.text());
    }

    // Strategy 2: allorigins.win (returns JSON {contents})
    async function fetchViaAllorigins() {
      const res = await fetch(
        'https://api.allorigins.win/get?url=' + encodeURIComponent('https://apod.nasa.gov/apod/astropix.html'),
        { signal: AbortSignal.timeout(8000) }
      );
      const data = await res.json();
      return parseAPODHtml(data.contents);
    }

    // Strategy 3: NASA APOD JSON API (CORS-native, no proxy needed)
    async function fetchViaNasaAPI() {
      const res  = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY',
        { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      const url  = (data.media_type === 'image') ? (data.url) : data.thumbnail_url;
      if (!url) return false;
      setBackground(url, data.title || '');
      return true;
    }

    function parseAPODHtml(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      let imgPath = null;
      for (const a of doc.querySelectorAll('a[href]')) {
        if (/image\/.*\.jpg$/i.test(a.getAttribute('href'))) { imgPath = a.getAttribute('href'); break; }
      }
      if (!imgPath) {
        for (const img of doc.querySelectorAll('img[src]')) {
          if (/image\/.*\.jpg$/i.test(img.getAttribute('src'))) { imgPath = img.getAttribute('src'); break; }
        }
      }
      if (!imgPath) return false;
      const bold = doc.querySelector('center b');
      setBackground('https://apod.nasa.gov/apod/' + imgPath, bold ? bold.textContent.trim() : '');
      return true;
    }

    function setBackground(url, title) {
      const bg     = document.getElementById('apod-bg');
      const credit = document.getElementById('apod-credit');
      bg.onload = () => bg.classList.add('loaded');
      bg.src = url;
      if (title) {
        credit.innerHTML =
          `<a href="https://apod.nasa.gov/apod/astropix.html" target="_blank" rel="noopener">APOD</a>: ${title}`;
      }
    }

    function fallbackBg() {
      document.body.style.background =
        'radial-gradient(ellipse at center, #0d1b3e 0%, #000005 100%)';
    }

    /* ══════════════════════════════════════════
       Banana interaction state machine
       idle → spinning (2 rotations = 8s) → floating
       ══════════════════════════════════════════ */
    let phase = 'idle';      // 'idle' | 'spinning' | 'floating'
    let spinTimer = null;
    let floatRAF  = null;
    let fx, fy, fvx, fvy, frot; // float state
    let fW, fH;                  // cached natural element dimensions

    // 1.5°/frame keeps 360° in 4 s at ~60 fps (matches CSS animation speed)
    const DEG_PER_FRAME = 1.5;
    const FLOAT_PX_PER_FRAME = 2.5;

    function handleClick(el) {
      if (phase === 'floating') return;

      if (phase === 'idle') {
        phase = 'spinning';
        el.classList.add('spinning');
        // 2 rotations × 4 s each = 8 s
        spinTimer = setTimeout(() => beginFloat(el), 8000);
      } else {
        // Cancel spin, back to idle
        phase = 'idle';
        el.classList.remove('spinning');
        clearTimeout(spinTimer);
      }
    }

    function beginFloat(el) {
      phase = 'floating';
      el.classList.remove('spinning');

      // Capture position and natural size BEFORE applying JS transform
      const rect = el.getBoundingClientRect();
      fx = rect.left;
      fy = rect.top;
      fW = rect.width;
      fH = rect.height;

      // Switch element to viewport-anchored fixed positioning
      el.style.position      = 'fixed';
      el.style.margin        = '0';
      el.style.left          = fx + 'px';
      el.style.top           = fy + 'px';
      el.style.transformOrigin = 'center center';

      // Randomise launch direction (ensure both axes have movement)
      const angle = Math.random() * Math.PI * 2;
      fvx = Math.cos(angle) * FLOAT_PX_PER_FRAME;
      fvy = Math.sin(angle) * FLOAT_PX_PER_FRAME;
      frot = 0;

      floatLoop(el);
    }

    function floatLoop(el) {
      fx   += fvx;
      fy   += fvy;
      frot += DEG_PER_FRAME;

      const vpW = window.innerWidth;
      const vpH = window.innerHeight;

      // Bounce off all four edges
      if (fx <= 0)        { fx = 0;        fvx =  Math.abs(fvx); }
      if (fx + fW >= vpW) { fx = vpW - fW; fvx = -Math.abs(fvx); }
      if (fy <= 0)        { fy = 0;        fvy =  Math.abs(fvy); }
      if (fy + fH >= vpH) { fy = vpH - fH; fvy = -Math.abs(fvy); }

      el.style.left      = fx + 'px';
      el.style.top       = fy + 'px';
      el.style.transform = `rotate(${frot}deg)`;

      floatRAF = requestAnimationFrame(() => floatLoop(el));
    }

    loadAPOD();

    /* ══════════════════════════════════════════
       Mouse star trail
       ══════════════════════════════════════════ */
    const STAR_CHARS = ['✦', '✧', '⋆', '★', '✩', '✫', '✬'];
    const STAR_COLORS = ['#fff', '#ffe066', '#aad4ff', '#ffb3e6', '#b3ffe6', '#e0b3ff'];

    function spawnStar(x, y) {
      const el = document.createElement('span');
      el.textContent = STAR_CHARS[Math.floor(Math.random() * STAR_CHARS.length)];

      const size  = 10 + Math.random() * 14;          // 10–24 px
      const color = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
      const vx    = (Math.random() - 0.5) * 3;        // horizontal drift
      const vy    = -(1.5 + Math.random() * 2.5);     // always fly upward
      const life  = 600 + Math.random() * 500;        // ms before gone

      Object.assign(el.style, {
        position:   'fixed',
        left:       (x - size / 2) + 'px',
        top:        (y - size / 2) + 'px',
        fontSize:   size + 'px',
        color:      color,
        pointerEvents: 'none',
        userSelect: 'none',
        zIndex:     9999,
        opacity:    1,
        transition: `opacity ${life}ms ease, transform ${life}ms ease`,
        transform:  'translate(0, 0) scale(1)',
        textShadow: `0 0 6px ${color}`,
      });

      document.body.appendChild(el);

      // Kick off movement on next frame so transition fires
      requestAnimationFrame(() => {
        el.style.transform = `translate(${vx * life / 16}px, ${vy * life / 16}px) scale(0.2)`;
        el.style.opacity   = '0';
      });

      setTimeout(() => el.remove(), life + 50);
    }

    let lastStarTime = 0;
    document.addEventListener('mousemove', e => {
      const now = Date.now();
      if (now - lastStarTime < 40) return;   // throttle: max ~25 stars/s
      lastStarTime = now;
      spawnStar(e.clientX, e.clientY);
    });
  </script>
</body>
</html>
