<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Banana</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    /* ── NASA APOD Background ── */
    #apod-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    #apod-bg.loaded { opacity: 1; }

    /* ── Banana wrapper ── */
    .banana-wrap {
      position: relative;
      z-index: 1;
      display: inline-block;
      cursor: pointer;
      user-select: none;
      width: 260px;
    }

    .banana-wrap.spinning {
      animation: clockwise 4s linear infinite;
    }

    @keyframes clockwise {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .banana-img {
      display: block;
      width: 100%;
      filter: drop-shadow(0 0 28px rgba(255, 230, 80, 0.5));
      pointer-events: none;
    }

    /* ── Ribbon image ── */
    .ribbon-img {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130%;
      pointer-events: none;
    }

    /* ── APOD credit ── */
    #apod-credit {
      position: fixed;
      bottom: 12px;
      right: 14px;
      z-index: 2;
      color: rgba(255,255,255,0.75);
      font-family: sans-serif;
      font-size: 0.72rem;
      text-align: right;
      max-width: 320px;
      text-shadow: 0 1px 4px #000;
    }
    #apod-credit a {
      color: rgba(180,210,255,0.95);
      text-decoration: none;
    }
    #apod-credit a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <img id="apod-bg" alt="NASA Astronomy Picture of the Day" />

  <div class="banana-wrap" id="banana" onclick="toggleSpin(this)">
    <img class="banana-img" src="banana.png" alt="Banana" />
    <img class="ribbon-img" src="ribbon.png" alt="Push me ribbon" />
  </div>

  <div id="apod-credit"></div>

  <script>
    /* ── Load NASA APOD by scraping the page via CORS proxy ── */
    async function loadAPOD() {
      const bg     = document.getElementById('apod-bg');
      const credit = document.getElementById('apod-credit');

      try {
        const proxyUrl = 'https://api.allorigins.win/get?url=' +
          encodeURIComponent('https://apod.nasa.gov/apod/astropix.html');

        const res  = await fetch(proxyUrl);
        const data = await res.json();

        // Parse the returned HTML
        const parser = new DOMParser();
        const doc    = parser.parseFromString(data.contents, 'text/html');

        // APOD always has the main image inside an <a href="image/...jpg">
        let imgUrl = null;
        const anchors = doc.querySelectorAll('a[href]');
        for (const a of anchors) {
          if (a.getAttribute('href').match(/image\/.*\.jpg$/i)) {
            imgUrl = 'https://apod.nasa.gov/apod/' + a.getAttribute('href');
            break;
          }
        }

        // Fallback: look for any <img src="image/...jpg">
        if (!imgUrl) {
          const imgs = doc.querySelectorAll('img[src]');
          for (const img of imgs) {
            if (img.getAttribute('src').match(/image\/.*\.jpg$/i)) {
              imgUrl = 'https://apod.nasa.gov/apod/' + img.getAttribute('src');
              break;
            }
          }
        }

        if (imgUrl) {
          bg.onload = () => bg.classList.add('loaded');
          bg.src = imgUrl;

          // Grab the page title for credit
          const titleEl = doc.querySelector('title');
          const titleText = titleEl ? titleEl.textContent.trim() : 'Astronomy Picture of the Day';
          credit.innerHTML =
            `<a href="https://apod.nasa.gov/apod/astropix.html" target="_blank" rel="noopener">
               NASA APOD
             </a>: ${titleText}`;
        } else {
          fallbackBg();
        }

      } catch (err) {
        console.warn('Could not load APOD:', err);
        fallbackBg();
      }
    }

    function fallbackBg() {
      document.body.style.background =
        'radial-gradient(ellipse at center, #0d1b3e 0%, #000005 100%)';
    }

    /* ── Banana click: toggle spin ── */
    function toggleSpin(el) {
      el.classList.toggle('spinning');
    }

    loadAPOD();
  </script>
</body>
</html>
